<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangaTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-section">
  <div class="auth-card">
    <div class="auth-header">
      <h1>MangaTracker</h1>
      <p>Seguí tus mangas al día</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-form="login">Iniciar sesión</button>
      <button class="auth-tab" data-form="signup">Registrarse</button>
    </div>

    <form id="auth-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div class="field hidden" id="confirm-field">
        <label for="confirm-password">Confirmar contraseña</label>
        <input type="password" id="confirm-password" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary btn-full" id="auth-btn">Iniciar sesión</button>
      <p id="auth-error" class="msg-error hidden"></p>
    </form>
  </div>
</div>

<div id="dashboard-section" class="hidden">
  <header class="topbar">
    <h1>MangaTracker</h1>
    <div class="topbar-right">
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn-ghost">Salir</button>
    </div>
  </header>

  <main class="main-content">
    <div class="toolbar">
      <button id="add-btn" class="btn-primary">+ Agregar manga</button>
      <button id="refresh-btn" class="btn-secondary">Actualizar</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-view="updated">Actualizadas</button>
      <button class="tab" data-view="all">Todas</button>
    </div>

    <div id="view-updated" class="tab-panel active">
      <div id="updated-list" class="manga-grid"></div>
    </div>

    <div id="view-all" class="tab-panel">
      <div id="all-list" class="manga-grid"></div>
    </div>
  </main>
</div>

<div id="add-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-body">
    <button class="modal-close">&times;</button>
    <h2>Agregar manga</h2>
    <div class="field">
      <label for="manga-url">URL del manga</label>
      <input type="url" id="manga-url" placeholder="https://www.leercapitulo.co/manga/..." autocomplete="off">
    </div>
    <button id="scrape-btn" class="btn-primary" disabled>Scrapear</button>
    <div id="scrape-result" class="hidden">
      <div class="preview-card">
        <img id="preview-img" alt="">
        <div class="preview-info">
          <strong id="preview-title"></strong>
          <span>Capítulo actual: <span id="preview-chapter"></span></span>
        </div>
      </div>
      <button id="confirm-add-btn" class="btn-primary btn-full">Agregar a mi lista</button>
    </div>
    <p id="scrape-msg" class="msg-error hidden"></p>
  </div>
</div>

<div id="edit-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-body">
    <button class="modal-close">&times;</button>
    <h2>Editar manga</h2>
    <p id="edit-title" class="edit-manga-title"></p>
    <div class="field">
      <label for="edit-my-chapter">Mi capítulo actual</label>
      <input type="number" id="edit-my-chapter" min="0">
    </div>
    <button id="save-edit-btn" class="btn-primary btn-full">Guardar</button>
    <p id="edit-msg" class="msg-error hidden"></p>
  </div>
</div>

<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
